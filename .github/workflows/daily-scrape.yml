name: Daily Scrape

on:
  schedule:
    - cron: "0 10 * * *"
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-scrape-pages
  cancel-in-progress: false

jobs:
  time-check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      snapshot_date: ${{ steps.check.outputs.snapshot_date }}

    steps:
      - name: Check New York run time
        id: check
        run: |
          snapshot_date="$(TZ=America/New_York date +%F)"
          current_hour="$(TZ=America/New_York date +%H)"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$current_hour" = "06" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi
          echo "snapshot_date=${snapshot_date}" >> "$GITHUB_OUTPUT"

  scrape-build-deploy:
    runs-on: ubuntu-latest
    needs: time-check
    if: needs.time-check.outputs.should_run == 'true'
    env:
      SNAPSHOT_DATE: ${{ needs.time-check.outputs.snapshot_date }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python crawl_jobs.py \
            --input data/companies.csv \
            --output jobs_out.csv \
            --log crawl_log.csv \
            --discovered-pages output/discovered_pages.csv \
            --failed-companies output/failed_companies.csv \
            --rejected-candidates output/rejected_candidates.csv \
            --timeout 15 \
            --retries 2 \
            --backoff 0.5 \
            --sleep 0.2 \
            --max-pages-per-company 12 \
            --snapshot-date "$SNAPSHOT_DATE"

      - name: Store snapshots and analytics
        run: |
          python update_snapshots.py \
            --jobs jobs_out.csv \
            --snapshot-date "$SNAPSHOT_DATE" \
            --client-output client/public/data/jobs_out.csv \
            --snapshots-dir data/snapshots \
            --analytics-dir data/analytics

      - name: Upload scrape logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-logs-${{ env.SNAPSHOT_DATE }}
          path: |
            crawl_log.csv
            output/discovered_pages.csv
            output/failed_companies.csv
            output/rejected_candidates.csv
          if-no-files-found: ignore

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add client/public/data/jobs_out.csv data/snapshots data/analytics
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Daily jobs snapshot update"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
